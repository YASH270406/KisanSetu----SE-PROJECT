<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KisanSetu | Manage Users</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="admin_dashboard_style.css">
    <link rel="stylesheet" href="../shared/common.css">
    <style>
        .admin-content { padding: 20px; }

        /* Search & Filter Bar - FIX: was missing entirely */
        .search-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
        }
        .search-bar input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            outline: none;
        }
        .search-bar input:focus { border-color: #4a148c; }
        .filter-select {
            padding: 10px 10px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.8rem;
            outline: none;
            color: #333;
            cursor: pointer;
        }

        /* Role filter pills - FIX: was missing */
        .role-pills {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
            margin-bottom: 14px;
        }
        .role-pill {
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1.5px solid #ddd;
            background: white;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.15s;
        }
        .role-pill.active { background: #4a148c; color: white; border-color: #4a148c; }

        /* User list cards */
        .user-list { margin-top: 4px; }
        .user-item {
            background: white;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #eaeaea;
        }
        .user-item.banned { border-left: 4px solid #d32f2f; opacity: 0.8; }
        .user-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .user-meta h4 { margin: 0; font-size: 0.95rem; font-weight: 600; }
        .user-meta p  { margin: 0; font-size: 0.78rem; color: #666; }

        .badge-role { padding: 4px 10px; border-radius: 10px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; }
        .role-farmer          { background: #e8f5e9; color: #2e7d32; }
        .role-buyer           { background: #e3f2fd; color: #1565c0; }
        .role-equipment_owner { background: #fff3e0; color: #ef6c00; }
        .role-admin           { background: #fce4ec; color: #c2185b; }
        .role-banned          { background: #ffebee; color: #d32f2f; }

        /* Action buttons row - FIX: was missing entirely */
        .user-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #f0f0f0;
        }
        .action-btn {
            padding: 5px 12px;
            border-radius: 8px;
            border: none;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: opacity 0.15s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .action-btn:hover { opacity: 0.8; }
        .btn-ban    { background: #ffebee; color: #d32f2f; }
        .btn-unban  { background: #e8f5e9; color: #2e7d32; }
        .btn-role   { background: #f3e5f5; color: #4a148c; }

        /* Role change dropdown - FIX: was missing */
        .role-dropdown {
            padding: 5px 8px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.75rem;
            font-family: 'Poppins', sans-serif;
            color: #4a148c;
            outline: none;
            cursor: pointer;
            background: #f3e5f5;
        }

        /* Stats summary bar */
        .stats-summary {
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 16px;
            font-size: 0.85rem;
            color: #555;
        }
        .stats-summary strong { color: #4a148c; }

        .empty-state {
            text-align: center;
            padding: 30px;
            color: #999;
            font-size: 0.85rem;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 0.85rem;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
    <div class="app-container">

        <header class="dashboard-header" style="background: linear-gradient(135deg, #37474f, #263238); color: white; padding: 25px 20px;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <a href="admin_dashboard.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
                <div>
                    <h1 style="font-size: 1.5rem;">User Management</h1>
                    <p style="font-size: 0.85rem; opacity: 0.9;">Verify Profiles & Assign Roles</p>
                </div>
            </div>
        </header>

        <div class="admin-content">

            <!-- FIX: Dynamic stats summary (SRS FR-1.6 - Admin Super User view) -->
            <div class="stats-summary" id="system-stats">
                Analyzing system users...
            </div>

            <!-- FIX: Search bar with role filter (SRS Section 3.1.3 - Admin Dashboard) -->
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Search by name or phone..." oninput="filterUsers()">
                <select class="filter-select" id="sort-select" onchange="filterUsers()">
                    <option value="newest">Newest</option>
                    <option value="oldest">Oldest</option>
                    <option value="name">Name A-Z</option>
                </select>
            </div>

            <!-- FIX: Role filter pills (SRS FR-1.2 - Roles: Farmer, Buyer, Equipment Owner) -->
            <div class="role-pills">
                <div class="role-pill active" onclick="setRoleFilter('all', this)">All</div>
                <div class="role-pill" onclick="setRoleFilter('farmer', this)">Farmers</div>
                <div class="role-pill" onclick="setRoleFilter('buyer', this)">Buyers</div>
                <div class="role-pill" onclick="setRoleFilter('equipment_owner', this)">Equipment Owners</div>
                <div class="role-pill" onclick="setRoleFilter('admin', this)">Admins</div>
                <div class="role-pill" onclick="setRoleFilter('banned', this)">Banned</div>
            </div>

            <div class="user-list" id="user-list-container">
                <p style="text-align: center; color: #999;">Loading profiles...</p>
            </div>

            <p style="text-align: center; color: #666; font-size: 0.85rem; margin-top: 20px;">
                <i class="fa-solid fa-shield-halved"></i> Live DB Monitoring Active
            </p>
        </div>

    </div>

    <div class="toast" id="toast"></div>

    <script type="module">
        import { supabase } from '../supabase-config.js';

        // FIX: Store all users in memory for client-side filter/sort without re-fetching
        let allUsers = [];
        let activeRoleFilter = 'all';

        document.addEventListener('DOMContentLoaded', async () => {
            await fetchUsers();
        });

        // FIX: Exposed to global scope for inline event handlers
        window.filterUsers = filterUsers;
        window.setRoleFilter = setRoleFilter;
        window.banUser = banUser;
        window.unbanUser = unbanUser;
        window.changeRole = changeRole;

        async function fetchUsers() {
            try {
                // SRS FR-1.6: Admin sees all profiles
                const { data, error, count } = await supabase
                    .from('profiles')
                    .select('*', { count: 'exact' })
                    .order('created_at', { ascending: false });

                if (error) throw error;

                allUsers = data || [];

                // FIX: Dynamic summary stats (SRS Section 4.1 - RBAC management)
                const roleCounts = allUsers.reduce((acc, u) => {
                    acc[u.role] = (acc[u.role] || 0) + 1;
                    return acc;
                }, {});
                const bannedCount = allUsers.filter(u => u.is_banned).length;

                document.getElementById('system-stats').innerHTML =
                    `Managing <strong>${count}</strong> users — ` +
                    `Farmers: <strong>${roleCounts.farmer || 0}</strong>, ` +
                    `Buyers: <strong>${roleCounts.buyer || 0}</strong>, ` +
                    `Equipment Owners: <strong>${roleCounts.equipment_owner || 0}</strong>` +
                    (bannedCount ? ` | <span style="color:#d32f2f">Banned: ${bannedCount}</span>` : '');

                renderUsers(allUsers);

            } catch (err) {
                console.error("Fetch users error:", err);
                document.getElementById('user-list-container').innerHTML =
                    '<p style="color: red; text-align: center;">Failed to load user data.</p>';
            }
        }

        function renderUsers(users) {
            const container = document.getElementById('user-list-container');
            if (!users.length) {
                container.innerHTML = '<div class="empty-state"><i class="fa-solid fa-users-slash" style="font-size:2rem; margin-bottom:10px;"></i><br>No users found.</div>';
                return;
            }

            container.innerHTML = users.map(user => {
                const date = new Date(user.created_at).toLocaleDateString('en-IN');
                const isBanned = user.is_banned;
                const displayRole = isBanned ? 'banned' : (user.role || 'farmer');

                return `
                <div class="user-item ${isBanned ? 'banned' : ''}" id="user-${user.id}">
                    <div class="user-top">
                        <div class="user-meta">
                            <h4>${escapeHtml(user.full_name || 'Unknown')}
                                ${isBanned ? '<span style="color:#d32f2f; font-size:0.7rem;"> (Banned)</span>' : ''}
                            </h4>
                            <p>📞 ${user.phone_number || 'N/A'} &nbsp;•&nbsp; Joined: ${date}</p>
                        </div>
                        <span class="badge-role role-${displayRole}">${displayRole}</span>
                    </div>

                    <!-- FIX: Role change and ban controls (SRS FR-1.6 - manage user accounts) -->
                    <div class="user-actions">
                        ${!isBanned ? `
                        <select class="role-dropdown" onchange="changeRole('${user.id}', this.value)">
                            <option value="" disabled selected>Change Role</option>
                            <option value="farmer"          ${user.role === 'farmer'           ? 'disabled' : ''}>Farmer</option>
                            <option value="buyer"           ${user.role === 'buyer'            ? 'disabled' : ''}>Buyer</option>
                            <option value="equipment_owner" ${user.role === 'equipment_owner'  ? 'disabled' : ''}>Equipment Owner</option>
                            <option value="admin"           ${user.role === 'admin'            ? 'disabled' : ''}>Admin</option>
                        </select>
                        <button class="action-btn btn-ban" onclick="banUser('${user.id}')">
                            <i class="fa-solid fa-ban"></i> Ban
                        </button>
                        ` : `
                        <button class="action-btn btn-unban" onclick="unbanUser('${user.id}')">
                            <i class="fa-solid fa-circle-check"></i> Unban
                        </button>
                        `}
                    </div>
                </div>`;
            }).join('');
        }

        // FIX: Client-side filter/sort (SRS Section 3.1.3 - Admin Dashboard tools)
        function filterUsers() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const sort  = document.getElementById('sort-select').value;

            let filtered = allUsers.filter(u => {
                const matchesSearch =
                    (u.full_name || '').toLowerCase().includes(query) ||
                    (u.phone_number || '').toLowerCase().includes(query);
                const matchesRole =
                    activeRoleFilter === 'all' ? true :
                    activeRoleFilter === 'banned' ? u.is_banned :
                    (u.role === activeRoleFilter && !u.is_banned);
                return matchesSearch && matchesRole;
            });

            if (sort === 'oldest') filtered.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
            else if (sort === 'name') filtered.sort((a, b) => (a.full_name || '').localeCompare(b.full_name || ''));

            renderUsers(filtered);
        }

        function setRoleFilter(role, el) {
            document.querySelectorAll('.role-pill').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            activeRoleFilter = role;
            filterUsers();
        }

        // FIX: Ban user with DB write + audit log (SRS FR-1.6, Section 6.4.2.4 Immutable Audit Trail)
        async function banUser(userId) {
            if (!confirm('Ban this user? They will lose platform access.')) return;
            try {
                const { error } = await supabase
                    .from('profiles')
                    .update({ is_banned: true })
                    .eq('id', userId);
                if (error) throw error;

                // Log admin action to audit trail
                await supabase.from('audit_logs').insert({
                    action: 'BAN_USER', target_id: userId, target_type: 'user',
                    details: 'User banned by administrator'
                });

                const user = allUsers.find(u => u.id === userId);
                if (user) user.is_banned = true;
                filterUsers();
                showToast('User banned successfully.');
            } catch (err) {
                console.error('Ban error:', err);
                showToast('Failed to ban user.');
            }
        }

        // FIX: Unban user (SRS FR-1.6)
        async function unbanUser(userId) {
            try {
                const { error } = await supabase
                    .from('profiles')
                    .update({ is_banned: false })
                    .eq('id', userId);
                if (error) throw error;

                await supabase.from('audit_logs').insert({
                    action: 'UNBAN_USER', target_id: userId, target_type: 'user',
                    details: 'User reinstated by administrator'
                });

                const user = allUsers.find(u => u.id === userId);
                if (user) user.is_banned = false;
                filterUsers();
                showToast('User reinstated.');
            } catch (err) {
                console.error('Unban error:', err);
                showToast('Failed to unban user.');
            }
        }

        // FIX: Role change with DB write (SRS FR-1.6 - manage user accounts & roles)
        async function changeRole(userId, newRole) {
            if (!newRole) return;
            try {
                const { error } = await supabase
                    .from('profiles')
                    .update({ role: newRole })
                    .eq('id', userId);
                if (error) throw error;

                await supabase.from('audit_logs').insert({
                    action: 'CHANGE_ROLE', target_id: userId, target_type: 'user',
                    details: `Role changed to ${newRole} by administrator`
                });

                const user = allUsers.find(u => u.id === userId);
                if (user) user.role = newRole;
                filterUsers();
                showToast(`Role updated to "${newRole}".`);
            } catch (err) {
                console.error('Role change error:', err);
                showToast('Failed to change role.');
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        function escapeHtml(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }
    </script>
</body>
</html>
